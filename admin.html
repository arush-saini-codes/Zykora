<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zykora Admin — Response Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #080808;
            --surface: #111111;
            --accent: #b06aff;
            --text: #f0f0f0;
            --muted: #666;
            --border: rgba(255,255,255,0.07);
        }

        body {
            background: var(--black);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            margin: 0;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 0.1em;
        }

        h1 span { color: var(--accent); }

        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border: 1px solid var(--border);
            flex: 1;
        }

        .stat-card div {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .stat-card span {
            font-size: 24px;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .tag {
            background: rgba(176,106,255,0.1);
            color: var(--accent);
            padding: 0.2rem 0.5rem;
            font-size: 11px;
            border-radius: 4px;
            margin-right: 0.5rem;
        }

        .no-data {
            text-align: center;
            padding: 4rem;
            color: var(--muted);
        }

        /* LOGIN SCREEN */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--surface);
            padding: 3rem;
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        .login-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
        }

        .login-input:focus { border-color: var(--accent); }

        .login-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            width: 100%;
        }

        .login-error {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 1rem;
            display: none;
        }

        #admin-content { display: none; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>ZY<span>K</span>ORA ADMIN</h2>
        <input type="password" id="password-input" class="login-input" placeholder="ENTER ACCESS KEY">
        <button class="login-btn" onclick="attemptLogin()">ACCESS DASHBOARD</button>
        <div id="login-error" class="login-error">Invalid access key. Try again.</div>
    </div>
</div>

<div id="admin-content">
    <header>
        <h1>ZY<span>K</span>ORA ADMIN</h1>
        <div style="font-family: 'JetBrains Mono', monospace; color: var(--muted);">Internal Dashboard v1.0</div>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div>Total Signups</div>
            <span id="total-count">0</span>
        </div>
        <div class="stat-card">
            <div>Latest Entry</div>
            <span id="latest-ts">—</span>
        </div>
    </div>

    <table id="responses-table">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Name</th>
                <th>Phone/WA</th>
                <th>Email</th>
                <th>Interest</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody id="responses-list">
            <!-- Responses will be injected here -->
        </tbody>
    </table>
</div>

<script>
    const STORAGE_KEY = 'zykora_auth';

    function attemptLogin() {
        const pass = document.getElementById('password-input').value;
        if (pass === 'JAISHREERAM') {
            sessionStorage.setItem(STORAGE_KEY, pass);
            showDashboard();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function showDashboard() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        fetchResponses();
        // Refresh every 30 seconds
        setInterval(fetchResponses, 30000);
    }

    async function fetchResponses() {
        const pass = sessionStorage.getItem(STORAGE_KEY);
        if (!pass) return;

        try {
            const res = await fetch('/api/responses', {
                headers: { 'Authorization': pass }
            });

            if (res.status === 401) {
                sessionStorage.removeItem(STORAGE_KEY);
                location.reload();
                return;
            }

            const data = await res.json();
            
            const list = document.getElementById('responses-list');
            const totalCount = document.getElementById('total-count');
            const latestTs = document.getElementById('latest-ts');

            totalCount.innerText = data.length;
            if (data.length > 0) {
                latestTs.innerText = new Date(data[data.length - 1].timestamp).toLocaleDateString();
                
                list.innerHTML = [...data].reverse().map(r => `
                    <tr>
                        <td style="font-family: 'JetBrains Mono'; font-size: 12px; color: #666;">
                            ${new Date(r.timestamp).toLocaleString()}
                        </td>
                        <td>${r.name || 'Web User'}</td>
                        <td><a href="https://wa.me/${r.whatsapp}" target="_blank" style="color: #25D366; text-decoration: none; font-family: 'JetBrains Mono'; font-size: 13px;">${r.whatsapp || 'N/A'}</a></td>
                        <td style="color: var(--accent);">${r.email || 'N/A'}</td>
                        <td>${(r.productInterest || []).map(i => `<span class="tag">${i}</span>`).join('')}</td>
                        <td style="font-size: 13px; color: #999;">${r.custom_request || r.additionalDetails || 'N/A'}</td>
                    </tr>
                `).join('');
            } else {
                list.innerHTML = '<tr><td colspan="6" class="no-data">No signups yet. Launch the demand!</td></tr>';
            }
        } catch (err) {
            console.error('Error fetching data:', err);
        }
    }

    // Check if already logged in
    if (sessionStorage.getItem(STORAGE_KEY) === 'JAISHREERAM') {
        showDashboard();
    }
    
    // Allow enter key to submit
    document.getElementById('password-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') attemptLogin();
    });
</script>

</body>
</html>
